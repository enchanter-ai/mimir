<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Merkle tree geometric illustration — Bauhaus / Swiss style -->
  <!-- Palette: #1d3a8e accent on white; no gradients, no glows -->

  <rect width="600" height="600" fill="white"/>

  <!-- Root node (level 0) -->
  <rect x="255" y="40" width="90" height="40" rx="3" fill="none" stroke="#1d3a8e" stroke-width="2"/>
  <text x="300" y="65" font-size="10" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace" letter-spacing="0.5">H(root)</text>

  <!-- Level 1 connectors -->
  <line x1="275" y1="80" x2="175" y2="140" stroke="#1d3a8e" stroke-width="1.5"/>
  <line x1="325" y1="80" x2="425" y2="140" stroke="#1d3a8e" stroke-width="1.5"/>

  <!-- Level 1 nodes -->
  <rect x="125" y="140" width="100" height="38" rx="3" fill="none" stroke="#1d3a8e" stroke-width="1.5"/>
  <text x="175" y="163" font-size="10" text-anchor="middle" fill="#1a1a1a" font-family="'JetBrains Mono', 'Consolas', monospace">H(L)</text>

  <rect x="375" y="140" width="100" height="38" rx="3" fill="none" stroke="#1d3a8e" stroke-width="1.5"/>
  <text x="425" y="163" font-size="10" text-anchor="middle" fill="#1a1a1a" font-family="'JetBrains Mono', 'Consolas', monospace">H(R)</text>

  <!-- Level 2 connectors — left branch -->
  <line x1="150" y1="178" x2="95" y2="238" stroke="#555" stroke-width="1.2"/>
  <line x1="200" y1="178" x2="255" y2="238" stroke="#555" stroke-width="1.2"/>

  <!-- Level 2 connectors — right branch -->
  <line x1="400" y1="178" x2="345" y2="238" stroke="#555" stroke-width="1.2"/>
  <line x1="450" y1="178" x2="505" y2="238" stroke="#555" stroke-width="1.2"/>

  <!-- Level 2 nodes -->
  <rect x="55" y="238" width="80" height="34" rx="3" fill="none" stroke="#888" stroke-width="1"/>
  <text x="95" y="259" font-size="9.5" text-anchor="middle" fill="#333" font-family="'JetBrains Mono', 'Consolas', monospace">H(LL)</text>

  <rect x="215" y="238" width="80" height="34" rx="3" fill="none" stroke="#888" stroke-width="1"/>
  <text x="255" y="259" font-size="9.5" text-anchor="middle" fill="#333" font-family="'JetBrains Mono', 'Consolas', monospace">H(LR)</text>

  <rect x="305" y="238" width="80" height="34" rx="3" fill="none" stroke="#888" stroke-width="1"/>
  <text x="345" y="259" font-size="9.5" text-anchor="middle" fill="#333" font-family="'JetBrains Mono', 'Consolas', monospace">H(RL)</text>

  <rect x="465" y="238" width="80" height="34" rx="3" fill="none" stroke="#888" stroke-width="1"/>
  <text x="505" y="259" font-size="9.5" text-anchor="middle" fill="#333" font-family="'JetBrains Mono', 'Consolas', monospace">H(RR)</text>

  <!-- Level 3 connectors — all four branches -->
  <line x1="75" y1="272" x2="55" y2="325" stroke="#bbb" stroke-width="1"/>
  <line x1="115" y1="272" x2="135" y2="325" stroke="#bbb" stroke-width="1"/>

  <line x1="235" y1="272" x2="215" y2="325" stroke="#bbb" stroke-width="1"/>
  <line x1="275" y1="272" x2="295" y2="325" stroke="#bbb" stroke-width="1"/>

  <line x1="325" y1="272" x2="305" y2="325" stroke="#bbb" stroke-width="1"/>
  <line x1="365" y1="272" x2="385" y2="325" stroke="#bbb" stroke-width="1"/>

  <line x1="485" y1="272" x2="465" y2="325" stroke="#bbb" stroke-width="1"/>
  <line x1="525" y1="272" x2="545" y2="325" stroke="#bbb" stroke-width="1"/>

  <!-- Level 3 leaf nodes — data blocks -->
  <!-- Using filled rectangles to represent leaf data -->
  <rect x="35" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="55" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₀</text>

  <rect x="115" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="135" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₁</text>

  <rect x="195" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="215" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₂</text>

  <rect x="275" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="295" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₃</text>

  <rect x="285" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.00" stroke="none"/>
  <!-- overlap: use the same x=305 -->
  <rect x="285" y="325" width="40" height="28" rx="2" fill="none" stroke="none"/>

  <rect x="285" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="305" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₄</text>

  <rect x="365" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="385" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₅</text>

  <rect x="445" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="465" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₆</text>

  <rect x="525" y="325" width="40" height="28" rx="2" fill="#1d3a8e" opacity="0.15" stroke="#1d3a8e" stroke-width="1"/>
  <text x="545" y="343" font-size="8" text-anchor="middle" fill="#1d3a8e" font-family="'JetBrains Mono', 'Consolas', monospace">d₇</text>

  <!-- Horizontal baseline rule under tree -->
  <line x1="40" y1="380" x2="560" y2="380" stroke="#d6d4cc" stroke-width="1"/>

  <!-- Label: "Provenance Merkle Feed" -->
  <text x="300" y="400" font-size="11" text-anchor="middle" fill="#888" font-family="system-ui, -apple-system, sans-serif" letter-spacing="0.08em" text-transform="uppercase">PROVENANCE MERKLE FEED</text>

  <!-- Abstract signature chain below — two rows of hex-like digest tokens -->
  <text x="300" y="438" font-size="8.5" text-anchor="middle" fill="#bbb" font-family="'JetBrains Mono', 'Consolas', monospace" letter-spacing="0.03em">sha-256:9b1f6e3a · 4c2d5f8e · 0a7b6c1d · 2e3f4a5b</text>
  <text x="300" y="456" font-size="8.5" text-anchor="middle" fill="#d6d4cc" font-family="'JetBrains Mono', 'Consolas', monospace" letter-spacing="0.03em">sha-256:2c4e8a1b · 5d7f3e9c · 0a2b4d6f · 8e1c3a5b</text>

  <!-- Bottom accent: two thin horizontal rules flanking a dot -->
  <line x1="40" y1="480" x2="278" y2="480" stroke="#d6d4cc" stroke-width="0.75"/>
  <circle cx="300" cy="480" r="3" fill="#1d3a8e"/>
  <line x1="322" y1="480" x2="560" y2="480" stroke="#d6d4cc" stroke-width="0.75"/>
</svg>
