<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Registry Query — § 8 — Enchanter Labs house style -->
  <rect width="720" height="480" fill="white"/>

  <defs>
    <marker id="rq-arrow-accent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1d3a8e"/>
    </marker>
    <marker id="rq-arrow-neutral" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#555"/>
    </marker>
    <marker id="rq-arrow-return" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#888"/>
    </marker>
  </defs>

  <!-- ── Actor header boxes ─────────────────────────────────────────── -->
  <!-- Consumer -->
  <rect x="40" y="20" width="120" height="36" rx="2" fill="#1d3a8e" stroke="#1d3a8e" stroke-width="1.5"/>
  <text x="100" y="43" font-size="12" text-anchor="middle" font-weight="600" fill="white">Consumer</text>

  <!-- Registry -->
  <rect x="270" y="20" width="120" height="36" rx="2" fill="#f7f7f5" stroke="#555" stroke-width="1.5"/>
  <text x="330" y="43" font-size="12" text-anchor="middle" font-weight="600" fill="#1a1a1a">Registry</text>

  <!-- Trust Anchor (DID resolver) -->
  <rect x="500" y="20" width="140" height="36" rx="2" fill="#f7f7f5" stroke="#555" stroke-width="1.5"/>
  <text x="570" y="38" font-size="12" text-anchor="middle" font-weight="600" fill="#1a1a1a">Trust Anchor</text>
  <text x="570" y="52" font-size="9" text-anchor="middle" fill="#888">(DID resolver)</text>

  <!-- ── Lifelines ───────────────────────────────────────────────────── -->
  <line x1="100" y1="56" x2="100" y2="420" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="330" y1="56" x2="330" y2="420" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="570" y1="56" x2="570" y2="420" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ── Messages ───────────────────────────────────────────────────── -->

  <!-- 1. Consumer → Registry: registry/lookup(tool_id, key_id) -->
  <line x1="100" y1="100" x2="328" y2="100" stroke="#1d3a8e" stroke-width="1.5" marker-end="url(#rq-arrow-accent)"/>
  <text x="215" y="91" font-size="11" text-anchor="middle" fill="#1d3a8e">registry/lookup</text>
  <text x="215" y="106" font-size="9.5" text-anchor="middle" fill="#aaa">(tool_id, key_id)</text>

  <!-- 2. Registry → Trust Anchor: resolve DID -->
  <line x1="330" y1="150" x2="568" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#rq-arrow-neutral)"/>
  <text x="450" y="142" font-size="11" text-anchor="middle" fill="#555">resolve DID</text>
  <text x="450" y="157" font-size="9.5" text-anchor="middle" fill="#aaa">(did:web:…)</text>

  <!-- 3. Trust Anchor → Registry: DID document (dashed return) -->
  <line x1="570" y1="195" x2="332" y2="195" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#rq-arrow-return)"/>
  <text x="450" y="187" font-size="11" text-anchor="middle" fill="#888">DID document</text>

  <!-- 4. Registry internal box: build trust_anchor_record -->
  <rect x="278" y="218" width="104" height="26" rx="2" fill="#eef1fa" stroke="#1d3a8e" stroke-width="1"/>
  <text x="330" y="235" font-size="10" text-anchor="middle" fill="#1d3a8e">build anchor record</text>

  <!-- 5. Registry → Consumer: trust_anchor_record (dashed return) -->
  <line x1="330" y1="262" x2="102" y2="262" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#rq-arrow-return)"/>
  <text x="215" y="254" font-size="11" text-anchor="middle" fill="#888">trust_anchor_record</text>

  <!-- ── Response fields legend box ────────────────────────────────── -->
  <line x1="40" y1="300" x2="680" y2="300" stroke="#d6d4cc" stroke-width="0.75"/>

  <text x="56" y="322" font-size="10" fill="#1a1a1a" font-weight="600">Response fields (§ 12.1)</text>

  <!-- Two-column layout -->
  <!-- Left column -->
  <text x="64" y="344" font-size="10" fill="#555">found</text>
  <text x="160" y="344" font-size="10" fill="#333">boolean — whether tool_id is registered</text>

  <text x="64" y="362" font-size="10" fill="#555">record</text>
  <text x="160" y="362" font-size="10" fill="#333">trust_anchor_record (present if found)</text>

  <text x="64" y="380" font-size="10" fill="#555">revocation</text>
  <text x="160" y="380" font-size="10" fill="#333">revocation_record (present if revoked)</text>

  <text x="64" y="398" font-size="10" fill="#555">feed_root</text>
  <text x="160" y="398" font-size="10" fill="#333">Merkle root of trust-anchor feed</text>

  <text x="64" y="416" font-size="10" fill="#555">response_at</text>
  <text x="160" y="416" font-size="10" fill="#333">UTC timestamp of registry response</text>

  <!-- Vertical separator between key and value -->
  <line x1="148" y1="330" x2="148" y2="422" stroke="#d6d4cc" stroke-width="0.75"/>

  <!-- ── Caption ───────────────────────────────────────────────────── -->
  <line x1="40" y1="440" x2="680" y2="440" stroke="#d6d4cc" stroke-width="0.75"/>
  <text x="360" y="458" font-size="9" text-anchor="middle" fill="#aaa" letter-spacing="0.06em">Figure 3 — Registry Query (§ 8)</text>
</svg>
