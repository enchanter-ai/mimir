<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="900" height="450" fill="white"/>

  <!-- Actor boxes -->
  <rect x="50" y="20" width="120" height="40" fill="white" stroke="black" stroke-width="1" rx="2"/>
  <text x="110" y="45" font-size="13" text-anchor="middle" font-weight="500">Consumer</text>

  <rect x="250" y="20" width="140" height="40" fill="white" stroke="black" stroke-width="1" rx="2"/>
  <text x="320" y="45" font-size="13" text-anchor="middle" font-weight="500">Registry</text>

  <rect x="550" y="20" width="140" height="40" fill="white" stroke="black" stroke-width="1" rx="2"/>
  <text x="620" y="45" font-size="13" text-anchor="middle" font-weight="500">Trust Anchor</text>

  <!-- Lifelines -->
  <line x1="110" y1="60" x2="110" y2="420" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="320" y1="60" x2="320" y2="420" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="620" y1="60" x2="620" y2="420" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="black"/>
    </marker>
    <marker id="dasharrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="black"/>
    </marker>
  </defs>

  <!-- Message 1: Consumer → Registry -->
  <line x1="110" y1="100" x2="320" y2="100" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="215" y="90" font-size="12" text-anchor="middle" fill="black">registry/lookup</text>
  <text x="215" y="107" font-size="11" text-anchor="middle" fill="#666">(tool_id, key_id)</text>

  <!-- Message 2: Registry → Trust Anchor -->
  <line x1="320" y1="150" x2="620" y2="150" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="470" y="140" font-size="12" text-anchor="middle" fill="black">resolve DID</text>

  <!-- Message 3: Trust Anchor ⇢ Registry (dashed) -->
  <line x1="620" y1="190" x2="320" y2="190" stroke="black" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#dasharrow)"/>
  <text x="470" y="180" font-size="12" text-anchor="middle" fill="black">DID document</text>

  <!-- Message 4: Registry ⇢ Consumer (dashed) -->
  <line x1="320" y1="240" x2="110" y2="240" stroke="black" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#dasharrow)"/>
  <text x="215" y="230" font-size="12" text-anchor="middle" fill="black">trust_anchor_record</text>

  <!-- Legend box -->
  <rect x="60" y="290" width="340" height="110" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="80" y="310" font-size="11" font-weight="500" fill="black">Response fields (§12.1):</text>

  <text x="80" y="330" font-size="10" fill="#333">• found: boolean</text>
  <text x="80" y="346" font-size="10" fill="#333">• record: trust_anchor_record (if found)</text>
  <text x="80" y="362" font-size="10" fill="#333">• revocation: revocation_record (if revoked)</text>
  <text x="80" y="378" font-size="10" fill="#333">• feed_root: Merkle root of trust-anchor feed</text>
  <text x="80" y="394" font-size="10" fill="#333">• response_at, registry_id</text>
</svg>
