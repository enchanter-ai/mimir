<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Producer Flow — § 8 — Enchanter Labs house style -->
  <!-- Palette: #1a1a1a text, #1d3a8e accent, #d6d4cc borders, white background -->
  <rect width="860" height="520" fill="white"/>

  <defs>
    <!-- Solid arrowhead in accent color -->
    <marker id="pf-arrow-accent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1d3a8e"/>
    </marker>
    <!-- Solid arrowhead in neutral -->
    <marker id="pf-arrow-neutral" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#555"/>
    </marker>
    <!-- Dashed return arrowhead -->
    <marker id="pf-arrow-return" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#888"/>
    </marker>
  </defs>

  <!-- ── Actor header boxes ─────────────────────────────────────────── -->
  <!-- LLM -->
  <rect x="20" y="20" width="90" height="36" rx="2" fill="#f7f7f5" stroke="#1d3a8e" stroke-width="1.5"/>
  <text x="65" y="43" font-size="12" text-anchor="middle" font-weight="600" fill="#1a1a1a">LLM</text>

  <!-- Client -->
  <rect x="160" y="20" width="90" height="36" rx="2" fill="#f7f7f5" stroke="#1d3a8e" stroke-width="1.5"/>
  <text x="205" y="43" font-size="12" text-anchor="middle" font-weight="600" fill="#1a1a1a">Client</text>

  <!-- Server (Producer) -->
  <rect x="300" y="20" width="120" height="36" rx="2" fill="#1d3a8e" stroke="#1d3a8e" stroke-width="1.5"/>
  <text x="360" y="43" font-size="12" text-anchor="middle" font-weight="600" fill="white">Server</text>
  <text x="360" y="55" font-size="9" text-anchor="middle" fill="#c8d5f5">(Producer)</text>

  <!-- Tool -->
  <rect x="470" y="20" width="90" height="36" rx="2" fill="#f7f7f5" stroke="#555" stroke-width="1.5"/>
  <text x="515" y="43" font-size="12" text-anchor="middle" font-weight="600" fill="#1a1a1a">Tool</text>

  <!-- Signing Service -->
  <rect x="610" y="20" width="130" height="36" rx="2" fill="#f7f7f5" stroke="#555" stroke-width="1.5"/>
  <text x="675" y="38" font-size="12" text-anchor="middle" font-weight="600" fill="#1a1a1a">Signing</text>
  <text x="675" y="52" font-size="12" text-anchor="middle" font-weight="600" fill="#1a1a1a">Service</text>

  <!-- ── Lifelines ───────────────────────────────────────────────────── -->
  <line x1="65"  y1="56" x2="65"  y2="500" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="205" y1="56" x2="205" y2="500" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="360" y1="56" x2="360" y2="500" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="515" y1="56" x2="515" y2="500" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="675" y1="56" x2="675" y2="500" stroke="#d6d4cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ── Messages ───────────────────────────────────────────────────── -->

  <!-- 1. LLM → Client: requests tool call -->
  <line x1="65" y1="100" x2="203" y2="100" stroke="#1d3a8e" stroke-width="1.5" marker-end="url(#pf-arrow-accent)"/>
  <text x="135" y="92" font-size="11" text-anchor="middle" fill="#1d3a8e">requests tool call</text>

  <!-- 2. Client → Server: tools/call + tool_call_id -->
  <line x1="205" y1="140" x2="358" y2="140" stroke="#1d3a8e" stroke-width="1.5" marker-end="url(#pf-arrow-accent)"/>
  <text x="282" y="132" font-size="11" text-anchor="middle" fill="#1d3a8e">tools/call</text>
  <text x="282" y="146" font-size="9.5" text-anchor="middle" fill="#888">(+ tool_call_id)</text>

  <!-- 3. Server → Tool: execute -->
  <line x1="360" y1="185" x2="513" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#pf-arrow-neutral)"/>
  <text x="437" y="177" font-size="11" text-anchor="middle" fill="#555">execute( args )</text>

  <!-- 4. Tool → Server: raw result (dashed return) -->
  <line x1="515" y1="220" x2="362" y2="220" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#pf-arrow-return)"/>
  <text x="437" y="212" font-size="11" text-anchor="middle" fill="#888">raw result</text>

  <!-- 5. Server internal box: transform + digest -->
  <rect x="316" y="242" width="88" height="26" rx="2" fill="#eef1fa" stroke="#1d3a8e" stroke-width="1"/>
  <text x="360" y="259" font-size="10" text-anchor="middle" fill="#1d3a8e">transform + digest</text>

  <!-- 6. Server → Signing Service: sign canonical form -->
  <line x1="360" y1="295" x2="673" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#pf-arrow-neutral)"/>
  <text x="517" y="287" font-size="11" text-anchor="middle" fill="#555">sign( canonical form )</text>

  <!-- 7. Signing Service → Server: signature value (dashed return) -->
  <line x1="675" y1="330" x2="362" y2="330" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#pf-arrow-return)"/>
  <text x="517" y="322" font-size="11" text-anchor="middle" fill="#888">signature.value</text>

  <!-- 8. Server internal box: attach envelope -->
  <rect x="300" y="350" width="120" height="26" rx="2" fill="#eef1fa" stroke="#1d3a8e" stroke-width="1"/>
  <text x="360" y="367" font-size="10" text-anchor="middle" fill="#1d3a8e">attach envelope</text>

  <!-- 9. Server → Client: tools/call response { result, provenance } (dashed return) -->
  <line x1="360" y1="395" x2="207" y2="395" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#pf-arrow-return)"/>
  <text x="283" y="387" font-size="11" text-anchor="middle" fill="#888">tools/call response</text>
  <text x="283" y="401" font-size="9.5" text-anchor="middle" fill="#aaa">&#x7B; result, provenance &#x7D;</text>

  <!-- 10. Client internal box: validate (§10) -->
  <rect x="163" y="417" width="84" height="26" rx="2" fill="#eef1fa" stroke="#1d3a8e" stroke-width="1"/>
  <text x="205" y="434" font-size="10" text-anchor="middle" fill="#1d3a8e">validate (§ 10)</text>

  <!-- 11. Client → LLM: result + validation status (dashed return) -->
  <line x1="205" y1="460" x2="67" y2="460" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#pf-arrow-return)"/>
  <text x="136" y="452" font-size="11" text-anchor="middle" fill="#888">result + validation</text>

  <!-- ── Caption ───────────────────────────────────────────────────── -->
  <line x1="20" y1="492" x2="840" y2="492" stroke="#d6d4cc" stroke-width="0.75"/>
  <text x="430" y="510" font-size="9" text-anchor="middle" fill="#aaa" letter-spacing="0.06em">Figure 1 — Producer Flow (§ 8)</text>
</svg>
